openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Greater Support Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Help center article operations
  - name: chat
    description: Chat and bot interaction operations
  - name: ingest
    description: Server-side scraping and extraction for the in-browser knowledge base
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List help articles
      description: Returns all help center articles, optionally filtered by category
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query to filter articles by title/description
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a single article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Article not found
  /chat:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a chat message
      description: Sends a user message, runs local intent matching and optional LLM enhancement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Bot response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
  /ingest/extract:
    post:
      operationId: ingestExtract
      tags: [ingest]
      summary: Fetch a URL and return cleaned, Readability-extracted text
      description: |
        Server-side fetch of a public http(s) URL. Returns the main article text
        as extracted by Mozilla Readability. No LLM is invoked; this is a pure
        deterministic extraction step intended to feed the in-browser embedding
        pipeline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractRequest"
      responses:
        "200":
          description: Extracted article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractResponse"
  /ingest/sitemap:
    post:
      operationId: ingestSitemap
      tags: [ingest]
      summary: Fetch and parse a sitemap into a flat list of page URLs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SitemapRequest"
      responses:
        "200":
          description: Sitemap URL list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveredUrls"
  /ingest/rss:
    post:
      operationId: ingestRss
      tags: [ingest]
      summary: Fetch and parse an RSS or Atom feed into a flat list of entry URLs
      description: |
        Mirrors `/ingest/sitemap` for syndication feeds. Accepts RSS 2.0 and
        Atom 1.0 documents; returns the link of each entry in document order.
        Useful for blog-style sources (Bitcoin Optech, project-news feeds)
        where there is no sitemap.xml.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RssRequest"
      responses:
        "200":
          description: Feed entry URL list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveredUrls"
  /escalate:
    post:
      operationId: escalateTicket
      tags: [chat]
      summary: Escalate to human support
      description: Generates a Zendesk-formatted support ticket payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EscalateRequest"
      responses:
        "200":
          description: Zendesk ticket payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EscalateResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        body:
          type: string
        category:
          type: string
        sourceUrl:
          type: string
        trustScore:
          type: number
        lastUpdated:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - body
        - category
        - sourceUrl
        - trustScore
        - lastUpdated
    ChatRequest:
      type: object
      properties:
        message:
          type: string
        sessionId:
          type: string
        biasId:
          type: string
          description: |
            Stable id of the active bias perspective at send time
            (e.g. "core", "knots", "neutral"). Used by the server to
            prepend a bias-specific system prompt so cloud fallbacks
            honor the same stance the visitor sees in the UI.
        biasLabel:
          type: string
          description: |
            Human-readable label of the active bias (e.g. "Core",
            "Knots"). Echoed back on the response so the per-message
            bias chip stays truthful even if the user toggles bias
            after sending.
      required:
        - message
        - sessionId
    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        intent:
          type: string
        trustScore:
          type: number
        isSecurityAlert:
          type: boolean
        isFinancialAdvice:
          type: boolean
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceReference"
        ciBreakdown:
          type: string
        lastUpdated:
          type: string
          format: date-time
        relatedArticles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        biasId:
          type: string
          description: Echo of the biasId honored when generating this reply.
        biasLabel:
          type: string
          description: Echo of the biasLabel honored when generating this reply.
      required:
        - reply
        - intent
        - trustScore
        - isSecurityAlert
        - isFinancialAdvice
        - sources
        - ciBreakdown
        - lastUpdated
    ExtractRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
        - url
    ExtractResponse:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
          nullable: true
        byline:
          type: string
          nullable: true
        contentText:
          type: string
        contentHtml:
          type: string
          nullable: true
        length:
          type: integer
        fetchedAt:
          type: string
          format: date-time
        warning:
          type: string
          nullable: true
      required:
        - url
        - contentText
        - length
        - fetchedAt
    SitemapRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
        - url
    RssRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
        - url
    DiscoveredUrls:
      type: object
      description: |
        Common response shape for any URL-discovery ingest endpoint
        (sitemap, RSS/Atom). `sourceUrl` echoes the input feed/sitemap.
      properties:
        sourceUrl:
          type: string
        urls:
          type: array
          items:
            type: string
        truncated:
          type: boolean
      required:
        - sourceUrl
        - urls
        - truncated
    SourceReference:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        type:
          type: string
      required:
        - title
        - url
        - type
    EscalateRequest:
      type: object
      properties:
        sessionId:
          type: string
        subject:
          type: string
        chatHistory:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - sessionId
        - subject
        - chatHistory
    ChatMessage:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - role
        - content
        - timestamp
    EscalateResponse:
      type: object
      properties:
        success:
          type: boolean
        ticket:
          type: object
          properties:
            subject:
              type: string
            comment:
              type: object
              properties:
                body:
                  type: string
              required:
                - body
            priority:
              type: string
            custom_fields:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  value:
                    type: string
                required:
                  - id
                  - value
          required:
            - subject
            - comment
            - priority
            - custom_fields
      required:
        - success
        - ticket
